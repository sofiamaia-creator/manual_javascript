<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>REPETIÇÃO</title>
  </head>
  <body>
    <script>
      //EXEMPLO ESTRUTURA DE REPETIÇÃO FOR:
      for (let i = 1; i <= 5; i++) {
        console.log(i); //a estrutura for é  quando temos uma repetição definida, aqui por ex só vai até o número 5
      }

      //EXEMPLO ESTRUTURA DE REPETIÇÃO WHILE:
      let i = 1;

      while (i <= 5) {
        console.log(i);
        i++;
      } // a estrutura while não é definida, então ela só para quando atingir a condição
    </script>
  </body>
</html>
