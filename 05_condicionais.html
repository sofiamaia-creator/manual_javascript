<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Condicionais</title>
  </head>
  <body>
    <script>
      //exemplo if:
      let idade = 18;

      if (idade >= 18) {
        console.log("Maior de idade");
      }

      //exemplo if else:
      let idade = 16;

      if (idade >= 18) {
        console.log("Maior de idade");
      } else {
        console.log("Menor de idade");
      }

      //EXEMPLO ELSE IF:
      let nota = 75;

      if (nota >= 90) {
        console.log("Aprovado com excelência");
      } else if (nota >= 60) {
        console.log("Aprovado");
      } else if (nota >= 40) {
        console.log("Recuperação");
      } else {
        console.log("Reprovado");
      }

      //EXEMPLO SWITCH CASE:
      let dia = 3;

      switch (dia) {
        case 1:
          console.log("Domingo");
          break;
        case 2:
          console.log("Segunda");
          break;
        case 3:
          console.log("Terça");
          break;
        default:
          console.log("Outro dia");
      }
    </script>
  </body>
</html>
