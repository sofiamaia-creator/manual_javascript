<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OPERADORES, COMPARAÇÃO E LÓGICA</title>
  </head>
  <body>
    <script>
    console.log(5 == "5"); //converte valores (por exemplo, "5" vira 5).

      
    console.log(5 === "5"); //não faz conversão automática de tipos, sendo mais previsível e confiável

      
    console.log(5 != "5");  //!= significa diferente

    
    console.log(5 !== "5"); //!== verifica se os valores são diferentes ou se os tipos são diferentes


      
    </script>
  </body>
</html>
